[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Pinned toolchain. solc is pre-provisioned under ~/.svm/0.8.28 (the default svm
# download host is unreachable in this environment; see contracts/README.md).
# `offline` stops forge from probing the blocked binaries.soliditylang.org host.
solc_version = "0.8.28"
offline = true
evm_version = "cancun"          # Gnosis Chain supports Cancun opcodes

optimizer = true
optimizer_runs = 200
via_ir = false                  # keep off for faster iteration; revisit at M2-9 if gas-bound

# Integer-only accounting contract: no unchecked surprises we didn't write.
# Deterministic test RNG so distribution/statistical tests are reproducible.
[fuzz]
runs = 256
seed = "0x4d32"                 # fixed seed: differential + distribution tests must be reproducible

[invariant]
runs = 256
depth = 64
fail_on_revert = false          # handler guards revert on out-of-domain calls by design

[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 512, depth = 128 }

# Remappings: forge auto-detects lib/, but pin them explicitly for clarity.
remappings = [
    "forge-std/=lib/forge-std/src/",
    "solady/=lib/solady/src/",
]
